name: GPTDriver Release Automation (iOS)

on:
  push:
    branches:
      - "Release-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  BuildAndTestOnMobileBoost:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Build TestBed App for Simulator
        run: |
          xcodebuild build \
            -project Branch-TestBed/Branch-TestBed.xcodeproj \
            -scheme Branch-TestBed \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip App Bundle
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r Branch-TestBed.zip Branch-TestBed.app

      - name: Run MobileBoost Release Plan
        env:
          MOBILEBOOST_API_KEY: ${{ secrets.MOBILEBOOST_API_KEY }}
        run: |
          # Token is consumed from the MOBILEBOOST_API_KEY env var by the
          # CLI; passing it via argv (`--token "$VAR"`) would shell-expand
          # the secret into the process arguments and expose it to anyone
          # running `ps aux` on the runner, defeating the env-var lift.
          mobileboost run \
            --app build/Build/Products/Debug-iphonesimulator/Branch-TestBed.zip \
            --platform ios \
            --tags Release
