name: Layer 1 - SDK Wire Validation (PR Gate)

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  validate-wire-logs:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Run Unit Tests & Capture Logs
        run: |
          xcodebuild test \
            -project BranchSDK.xcodeproj \
            -scheme BranchSDKTests \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            | tee ios_test_output.log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run L1 Validation Script
        run: python scripts/validate_l1_logs.py ios_test_output.log

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-wire-logs
          path: ios_test_output.log
